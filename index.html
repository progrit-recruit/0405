async function openARView(spotId) {
  const spot = SPOTS.find(s => s.id === spotId);
  if (!spot) return;
  const anime = ANIME.find(a => a.id === spot.animeId);
  const char  = AR_CHARS[spot.animeId] || { hair:'#333', item:'star' };

  // iOS DeviceOrientation permission
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
  }

  // Camera
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
  } catch(e) {
    alert(t('arNoCamera')); return;
  }
  arStream = stream;

  // Build overlay
  const overlay = document.createElement('div');
  overlay.id = 'ar-overlay';
  overlay.innerHTML = `
    <video id="ar-video" autoplay playsinline muted></video>
    <canvas id="ar-canvas"></canvas>
    <div id="ar-top-bar">
      <button id="ar-back-btn" onclick="closeARView()">← ${t('arBack')}</button>
      <div id="ar-spot-label">${anime.icon} ${spotName(spot)}</div>
    </div>
    <div id="ar-hint">${t('arHint')}</div>`;
  document.body.appendChild(overlay);

  const video = document.getElementById('ar-video');
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });

  arCurrentSpotId = spot.id;
  arBubbleText = ''; arBubbleOpacity = 0;
  arLoadImage(spot.animeId); // カスタム画像があればプリロード

  const onOrient = e => { arGamma = e.gamma || 0; arBeta = e.beta || 0; };
  window.addEventListener('deviceorientation', onOrient);
  overlay._cleanup = () => window.removeEventListener('deviceorientation', onOrient);

  // ドラッグ移動 + タップでセリフ
  const arCanvasEl = document.getElementById('ar-canvas');
  let _dragActive = false, _dragMoved = false;
  let _dragStartX = 0, _dragStartY = 0, _dragBaseX = 0, _dragBaseY = 0;

  arCanvasEl.addEventListener('pointerdown', e => {
    _dragActive = true; _dragMoved = false;
    _dragStartX = e.clientX; _dragStartY = e.clientY;
    _dragBaseX = arCharPos ? arCharPos.x : window.innerWidth  / 2;
    _dragBaseY = arCharPos ? arCharPos.y : window.innerHeight / 2;
    arCanvasEl.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  arCanvasEl.addEventListener('pointermove', e => {
    if (!_dragActive) return;
    const dx = e.clientX - _dragStartX;
    const dy = e.clientY - _dragStartY;
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) _dragMoved = true;
    if (_dragMoved) {
      arCharPos = { x: _dragBaseX + dx, y: _dragBaseY + dy };
    }
    e.preventDefault();
  });
  arCanvasEl.addEventListener('pointerup', e => {
    if (!_dragActive) return;
    _dragActive = false;
    if (!_dragMoved) arSayLine(spot.id, spot.animeId); // タップ判定
    e.preventDefault();
  });
  arCanvasEl.addEventListener('pointercancel', () => { _dragActive = false; });

  startARDraw(anime, char);

  // 登場後に自動で一言
  setTimeout(() => {
    if (document.getElementById('ar-canvas')) arSayLine(spot.id, spot.animeId);
  }, 1800);

  setTimeout(() => {
    const hint = document.getElementById('ar-hint');
    if (hint) hint.style.opacity = '0';
  }, 4000);
}

function closeARView() {
  window.speechSynthesis?.cancel();
  if (arAnimId) { cancelAnimationFrame(arAnimId); arAnimId = null; }
  if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
  const overlay = document.getElementById('ar-overlay');
  if (overlay) { overlay._cleanup?.(); overlay.remove(); }
  arGamma = 0; arBeta = 0; arBubbleText = ''; arBubbleOpacity = 0; arCharPos = null;
}

function startARDraw(anime, char) {
  const canvas = document.getElementById('ar-canvas');
  const ctx    = canvas.getContext('2d');
  let phase = 0;

  // Floating particles
  const particles = Array.from({length:22}, () => ({
    angle: Math.random() * Math.PI * 2,
    r: 70 + Math.random() * 80,
    speed: 0.007 + Math.random() * 0.013,
    size: 3 + Math.random() * 5,
    op: 0.4 + Math.random() * 0.5,
    off: Math.random() * Math.PI * 2,
  }));

  let enterT = 0;

  function frame() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    phase  += 0.04;
    enterT  = Math.min(enterT + 0.035, 1);
    const es = arEaseElastic(enterT);

    // 初回フレームで画面中央に初期化
    if (!arCharPos) {
      arCharPos = { x: canvas.width / 2, y: canvas.height / 2 };
    }

    const bobY = Math.sin(phase) * 10;
    const cx = arCharPos.x;
    const cy = arCharPos.y + bobY * es;
    const s  = Math.min(canvas.width, canvas.height) * 0.25 * es;

    // Particles
    particles.forEach(p => {
      p.angle += p.speed;
      const px = cx + Math.cos(p.angle) * p.r * es;
      const py = cy - s * 0.3 + Math.sin(p.angle) * p.r * 0.5 * es;
      const twinkle = 0.5 + 0.5 * Math.sin(phase * 2.2 + p.off);
      ctx.save();
      ctx.globalAlpha = p.op * twinkle * es;
      ctx.fillStyle   = anime.color;
      ctx.shadowBlur  = 8; ctx.shadowColor = anime.color;
      arDrawStar(ctx, px, py, p.size * twinkle, p.size * twinkle * 0.4);
      ctx.fill();
      ctx.restore();
    });

    if (s > 4) {
      const customImg = AR_IMAGES[anime.id];
      if (customImg?.complete && customImg.naturalWidth > 0) {
        arDrawImageCharacter(ctx, cx, cy, s, customImg, anime, phase);
      } else {
        arDrawCharacter(ctx, cx, cy, s, anime, char);
      }
    }

    // 吹き出し
    if (arBubbleOpacity > 0) {
      arBubbleOpacity = Math.max(0, arBubbleOpacity - 0.006);
      // 画像キャラは頭がより上にあるので吹き出し位置を調整
      const hasCustomImg = AR_IMAGES[anime.id]?.complete && AR_IMAGES[anime.id]?.naturalWidth > 0;
      arDrawBubble(ctx, cx, cy, s, arBubbleText, arBubbleOpacity, hasCustomImg);
    }

    arAnimId = requestAnimationFrame(frame);
  }
  frame();
}

function arSayLine(spotId, animeId) {
  const entry = AR_DIALOGUE[spotId] || AR_DIALOGUE[animeId];
  const pool  = entry
    ? (entry[currentLang] || entry.ja)
    : ['…'];
  const line = pool[Math.floor(Math.random() * pool.length)];
  arBubbleText    = line;
  arBubbleOpacity = 1;
  arSpeakLine(line);
}

function arSpeakLine(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const langMap  = { ja: 'ja-JP', en: 'en-US', zh: 'zh-CN', ko: 'ko-KR' };
  const langCode = langMap[currentLang] || 'ja-JP';
  const utter    = new SpeechSynthesisUtterance(text);
  utter.lang     = langCode;
  utter.rate     = currentLang === 'ja' ? 0.92 : 1.0;
  utter.pitch    = currentLang === 'ja' ? 1.25 : 1.1;
  const voices   = window.speechSynthesis.getVoices();
  const voice    = voices.find(v => v.lang === langCode)
                || voices.find(v => v.lang.startsWith(langCode.split('-')[0]));
  if (voice) utter.voice = voice;
  window.speechSynthesis.speak(utter);
}

function arDrawBubble(ctx, cx, cy, s, text, opacity, isImageChar = false) {
  if (!text || opacity <= 0) return;
  ctx.save();
  ctx.globalAlpha = opacity;

  const fontSize = Math.max(12, s * 0.19);
  ctx.font = `bold ${fontSize}px 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif`;

  // テキスト折り返し（最大幅 s*2）
  const arCanvas = document.getElementById('ar-canvas');
  const maxW = Math.min(arCanvas ? arCanvas.width * 0.8 : 300, s * 2.2);
  const lines = arWrapText(ctx, text, maxW - s * 0.3);
  const lineH = fontSize * 1.4;
  const padX  = s * 0.22, padY = s * 0.18;
  const bw = Math.min(maxW, ctx.measureText(text).width + padX * 2);
  const bh = lines.length * lineH + padY * 2;
  const bx = cx - bw / 2;
  const charTop = isImageChar ? s * 2.8 * 0.82 : s * 1.72;
  const by = cy - charTop - bh;

  // 影
  ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(0,0,0,0.25)';

  // 背景
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, fontSize * 0.55); ctx.fill();

  // テール
  ctx.beginPath();
  ctx.moveTo(cx - s*0.08, by + bh);
  ctx.lineTo(cx, cy - (isImageChar ? s * 2.8 * 0.7 : s * 1.58));
  ctx.lineTo(cx + s*0.08, by + bh);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;

  // テキスト
  ctx.fillStyle = '#222';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  lines.forEach((ln, i) => {
    ctx.fillText(ln, cx, by + padY + lineH * i + lineH / 2);
  });

  ctx.restore();
}

function arWrapText(ctx, text, maxW) {
  const words = text.split('');
  const lines = []; let cur = '';
  for (const ch of words) {
    const test = cur + ch;
    if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = ch; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  return lines.length ? lines : [text];
}

function arEaseElastic(t) {
  if (t <= 0) return 0; if (t >= 1) return 1;
  return Math.pow(2, -10*t) * Math.sin((t*10 - 0.75) * (2*Math.PI/3)) + 1;
}

function arDrawStar(ctx, x, y, r1, r2) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? r1 : r2;
    const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    i === 0 ? ctx.moveTo(x + r*Math.cos(a), y + r*Math.sin(a))
            : ctx.lineTo(x + r*Math.cos(a), y + r*Math.sin(a));
  }
  ctx.closePath();
}

function arDrawImageCharacter(ctx, cx, cy, s, img, anime, phase) {
  const ac = anime.color;
  const h  = s * 2.8;
  const w  = h * (img.naturalWidth / img.naturalHeight); // 190/482 ≈ 0.394
  // 座標系: translate(cx+driftX, cy) 後の相対座標
  const ix = -w / 2;   // 画像左端
  const iy = -h * 0.82; // 画像上端（足元が y=0 付近に来るよう）

  // --- アイドルスウェイ ---
  const swayAngle = Math.sin(phase * 0.55) * 0.022;       // ±1.3°の揺れ
  const driftX    = Math.sin(phase * 0.38) * s * 0.022;   // 水平ドリフト

  ctx.save();
  ctx.translate(cx + driftX, cy);
  ctx.rotate(swayAngle);

  // 地面の影
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, h * 0.09, w * 0.40, h * 0.04, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // --- ①全体を描画（グロー込み）---
  const skirtY = h * 0.518; // スカート開始位置 (482px中 250px)
  ctx.shadowBlur = 26; ctx.shadowColor = ac;
  ctx.drawImage(img, ix, iy, w, h);
  ctx.shadowBlur = 0;

  // --- ②下半身をシア変形で上書き（スカート物理）---
  // ウエストライン(y0)を軸にした水平シア: x' = x + skirtSway*(y - y0)
  const skirtSway = Math.sin(phase * 1.15 + 0.6) * 0.038
                  + (arGamma || 0) * 0.0022;
  const y0 = iy + skirtY;
  ctx.save();
  ctx.beginPath(); ctx.rect(ix - 20, iy + skirtY - 1, w + 40, h - skirtY + 10); ctx.clip();
  ctx.globalCompositeOperation = 'source-atop'; // 既存ピクセルの上にのみ描画
  ctx.transform(1, 0, skirtSway, 1, -skirtSway * y0, 0);
  ctx.drawImage(img, ix, iy, w, h);
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();

  // --- 名前プレート ---
  ctx.shadowBlur = 10; ctx.shadowColor = ac;
  ctx.fillStyle = 'rgba(0,0,0,.72)';
  const pw = s*1.64, ph = s*0.45;
  ctx.beginPath(); ctx.roundRect(-pw/2, h*0.10, pw, ph, s*0.1); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = ac;
  ctx.font = `bold ${s*0.19}px 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(animeTitle(anime), 0, h*0.10 + ph/2);

  ctx.restore();
}

function arDrawCharacter(ctx, cx, cy, s, anime, char) {
  const ac   = anime.color;
  const hair = char.hair;
  const skin = '#ffdab5';

  ctx.save();
  ctx.translate(cx, cy);

  // Ground shadow
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, s*0.98, s*0.4, s*0.09, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // --- Skirt ---
  ctx.shadowBlur = 22; ctx.shadowColor = ac;
  ctx.fillStyle = ac;
  ctx.beginPath();
  ctx.moveTo(-s*0.28, s*0.10); ctx.lineTo(s*0.28, s*0.10);
  ctx.lineTo(s*0.50, s*0.92);  ctx.lineTo(-s*0.50, s*0.92);
  ctx.closePath(); ctx.fill();

  // --- Torso ---
  const tg = ctx.createLinearGradient(-s*0.22, -s*0.3, s*0.22, s*0.12);
  tg.addColorStop(0, arLighten(ac, 35)); tg.addColorStop(1, ac);
  ctx.fillStyle = tg;
  ctx.beginPath(); ctx.roundRect(-s*0.22, -s*0.3, s*0.44, s*0.44, s*0.04); ctx.fill();

  // --- Arms ---
  ctx.shadowBlur = 0;
  ctx.strokeStyle = ac; ctx.lineWidth = s*0.15; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*0.22, -s*0.12);
  ctx.quadraticCurveTo(-s*0.58, s*0.20, -s*0.55, s*0.56); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*0.22, -s*0.12);
  ctx.quadraticCurveTo(s*0.58, s*0.20, s*0.55, s*0.56); ctx.stroke();

  // --- Legs ---
  ctx.strokeStyle = '#777'; ctx.lineWidth = s*0.14;
  ctx.beginPath(); ctx.moveTo(-s*0.17, s*0.90); ctx.lineTo(-s*0.17, s*1.18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*0.17, s*0.90);  ctx.lineTo(s*0.17, s*1.18);  ctx.stroke();
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.ellipse(-s*0.17, s*1.20, s*0.14, s*0.07, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.17, s*1.20, s*0.14, s*0.07, 0, 0, Math.PI*2); ctx.fill();

  // --- Neck ---
  ctx.fillStyle = skin; ctx.fillRect(-s*0.07, -s*0.38, s*0.14, s*0.13);

  // --- Head ---
  ctx.shadowBlur = 16; ctx.shadowColor = ac;
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0, -s*0.66, s*0.31, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // --- Hair ---
  ctx.fillStyle = hair;
  ctx.beginPath(); ctx.arc(0, -s*0.74, s*0.34, Math.PI, 0); ctx.fill();
  // Bangs
  ctx.beginPath();
  ctx.moveTo(-s*0.34, -s*0.7);
  ctx.quadraticCurveTo(-s*0.37, -s*0.52, -s*0.30, -s*0.44);
  ctx.lineTo(-s*0.12, -s*0.44);
  ctx.quadraticCurveTo(-s*0.06, -s*0.94, 0, -s*0.98);
  ctx.quadraticCurveTo(s*0.06, -s*0.94, s*0.12, -s*0.44);
  ctx.lineTo(s*0.30, -s*0.44);
  ctx.quadraticCurveTo(s*0.37, -s*0.52, s*0.34, -s*0.7);
  ctx.fill();
  // Side strands
  ctx.beginPath(); ctx.ellipse(-s*0.33, -s*0.60, s*0.11, s*0.26, -0.25, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.33, -s*0.60, s*0.11, s*0.26, 0.25, 0, Math.PI*2); ctx.fill();

  // --- Eyes ---
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.ellipse(-s*0.11, -s*0.64, s*0.085, s*0.105, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.11, -s*0.64, s*0.085, s*0.105, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = ac;
  ctx.beginPath(); ctx.ellipse(-s*0.11, -s*0.64, s*0.065, s*0.085, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.11, -s*0.64, s*0.065, s*0.085, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(-s*0.11, -s*0.64, s*0.038, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.11, -s*0.64, s*0.038, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.arc(-s*0.088, -s*0.667, s*0.019, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.132, -s*0.667, s*0.019, 0, Math.PI*2); ctx.fill();

  // --- Blush ---
  ctx.globalAlpha = 0.32;
  ctx.fillStyle = '#ff8888';
  ctx.beginPath(); ctx.ellipse(-s*0.22, -s*0.57, s*0.1, s*0.045, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.22, -s*0.57, s*0.1, s*0.045, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // --- Mouth ---
  ctx.strokeStyle = '#d08060'; ctx.lineWidth = s*0.024; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, -s*0.52, s*0.058, 0.18, Math.PI-0.18); ctx.stroke();

  // --- Accessory ---
  arDrawAccessory(ctx, char.item, ac, s);

  // --- Name plate ---
  ctx.shadowBlur = 12; ctx.shadowColor = ac;
  ctx.fillStyle = 'rgba(0,0,0,.7)';
  ctx.beginPath(); ctx.roundRect(-s*0.82, s*1.32, s*1.64, s*0.45, s*0.1); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = ac;
  ctx.font = `bold ${s*0.19}px 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(animeTitle(anime), 0, s*1.545);

  ctx.restore();
}

function arDrawAccessory(ctx, item, ac, s) {
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  switch (item) {
    case 'cord':
      ctx.strokeStyle = '#ff6b9d'; ctx.lineWidth = s*0.038; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(s*0.55, s*0.48);
      ctx.bezierCurveTo(s*0.78, s*0.28, s*0.98, s*0.48, s*0.90, s*0.75); ctx.stroke();
      ctx.shadowBlur = 10; ctx.shadowColor = '#ff6b9d';
      ctx.fillStyle = '#ff6b9d';
      ctx.beginPath(); ctx.arc(s*0.90, s*0.75, s*0.075, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      break;
    case 'flower':
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2;
        ctx.fillStyle = ac;
        ctx.beginPath(); ctx.ellipse(s*0.72+Math.cos(a)*s*0.14, s*0.28+Math.sin(a)*s*0.14, s*0.095, s*0.048, a, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#fff176';
      ctx.beginPath(); ctx.arc(s*0.72, s*0.28, s*0.095, 0, Math.PI*2); ctx.fill();
      break;
    case 'book':
      ctx.shadowBlur = 6; ctx.shadowColor = ac;
      ctx.fillStyle = ac;
      ctx.beginPath(); ctx.roundRect(s*0.5, s*0.36, s*0.36, s*0.46, s*0.03); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,.28)'; ctx.fillRect(s*0.51, s*0.40, s*0.055, s*0.38);
      ctx.strokeStyle = 'rgba(255,255,255,.38)'; ctx.lineWidth = s*0.016;
      for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.moveTo(s*0.57, s*(0.45+i*0.10)); ctx.lineTo(s*0.84, s*(0.45+i*0.10)); ctx.stroke(); }
      break;
    case 'helmet':
      ctx.shadowBlur = 8; ctx.shadowColor = ac;
      ctx.fillStyle = ac;
      ctx.beginPath(); ctx.arc(0, -s*1.02, s*0.25, Math.PI, 0); ctx.fill();
      ctx.fillRect(-s*0.25, -s*1.02, s*0.50, s*0.11);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.fillRect(-s*0.14, -s*0.98, s*0.28, s*0.08);
      break;
    case 'sunflower':
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.ellipse(s*0.68+Math.cos(a)*s*0.16, s*0.26+Math.sin(a)*s*0.16, s*0.095, s*0.048, a, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#5c3d2e'; ctx.beginPath(); ctx.arc(s*0.68, s*0.26, s*0.11, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#886644'; ctx.beginPath(); ctx.arc(s*0.68, s*0.26, s*0.065, 0, Math.PI*2); ctx.fill();
      break;
    case 'lantern':
      ctx.strokeStyle = '#999'; ctx.lineWidth = s*0.022;
      ctx.beginPath(); ctx.moveTo(s*0.55, s*0.44); ctx.lineTo(s*0.64, s*0.52); ctx.stroke();
      ctx.shadowBlur = 18; ctx.shadowColor = '#ff9900';
      ctx.fillStyle = '#fffbe0';
      ctx.beginPath(); ctx.roundRect(s*0.55, s*0.52, s*0.24, s*0.32, s*0.045); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,140,0,.42)';
      ctx.beginPath(); ctx.arc(s*0.67, s*0.68, s*0.09, 0, Math.PI*2); ctx.fill();
      break;
    case 'note':
      ctx.font = `bold ${s*0.46}px serif`;
      ctx.fillStyle = ac; ctx.shadowBlur = 14; ctx.shadowColor = ac;
      ctx.fillText('♪', s*0.72, s*0.24);
      ctx.shadowBlur = 0;
      break;
    case 'star':
      ctx.shadowBlur = 16; ctx.shadowColor = ac;
      ctx.fillStyle = ac;
      arDrawStar(ctx, s*0.72, s*0.24, s*0.22, s*0.10); ctx.fill();
      ctx.shadowBlur = 0;
      break;
    case 'digital':
      ctx.shadowBlur = 12; ctx.shadowColor = ac;
      ctx.strokeStyle = ac; ctx.lineWidth = s*0.04;
      ctx.beginPath(); ctx.roundRect(-s*0.46, -s*1.08, s*0.92, s*0.24, s*0.05); ctx.stroke();
      ctx.fillStyle = 'rgba(0,80,255,.22)'; ctx.fill();
      ctx.font = `bold ${s*0.14}px monospace`;
      ctx.fillStyle = ac; ctx.fillText('OZ', 0, -s*0.94);
      ctx.shadowBlur = 0;
      break;
  }
  ctx.restore();
}

function arLighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (n>>16) + amt);
  const g = Math.min(255, ((n>>8)&0xff) + amt);
  const b = Math.min(255, (n&0xff) + amt);
  return `rgb(${r},${g},${b})`;
}

let _introActive = false;
let _introStep = 0;

// ---- Birthday select population ----
function populateBirthSelects() {
  const lang = currentLang;
  const yearSel  = document.getElementById('birth-year');
  const monthSel = document.getElementById('birth-month');
  const daySel   = document.getElementById('birth-day');
  if (!yearSel || !monthSel || !daySel) return;

  const savedY = yearSel.value, savedM = monthSel.value, savedD = daySel.value;
  const curYear = new Date().getFullYear();

  // Year
  yearSel.innerHTML = '';
  const yPh = document.createElement('option'); yPh.value=''; yPh.textContent=t('birthYearPh'); yearSel.appendChild(yPh);
  for (let y = curYear - 5; y >= 1950; y--) {
    const o = document.createElement('option'); o.value = y;
    o.textContent = (lang==='ja'||lang==='zh') ? `${y}年` : lang==='ko' ? `${y}년` : `${y}`;
    yearSel.appendChild(o);
  }
  if (savedY) yearSel.value = savedY;

  // Month
  const MONTHS = {
    ja: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    en: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    zh: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    ko: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
  };
  monthSel.innerHTML = '';
  const mPh = document.createElement('option'); mPh.value=''; mPh.textContent=t('birthMonthPh'); monthSel.appendChild(mPh);
  (MONTHS[lang] || MONTHS.ja).forEach((name, i) => {
    const o = document.createElement('option'); o.value = i+1; o.textContent = name; monthSel.appendChild(o);
  });
  if (savedM) monthSel.value = savedM;

  // Day
  daySel.innerHTML = '';
  const dPh = document.createElement('option'); dPh.value=''; dPh.textContent=t('birthDayPh'); daySel.appendChild(dPh);
  for (let d = 1; d <= 31; d++) {
    const o = document.createElement('option'); o.value = d;
    o.textContent = (lang==='ja'||lang==='zh') ? `${d}日` : lang==='ko' ? `${d}일` : `${d}`;
    daySel.appendChild(o);
  }
  if (savedD) daySel.value = savedD;
}

// ---- Language selection ----
function selectIntroLang(lang) {
  setLang(lang);
  document.querySelectorAll('.intro-lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  // Update step labels
  const langLabel  = document.getElementById('intro-lang-label');
  if (langLabel)  langLabel.textContent  = t('introLangLabel');
  const birthLabel = document.getElementById('intro-birth-label');
  if (birthLabel) birthLabel.textContent = t('introBirthLabel');
  const nickLabel  = document.getElementById('intro-nick-label');
  if (nickLabel)  nickLabel.textContent  = t('introNickLabel');
  const nickInput  = document.getElementById('intro-nickname');
  if (nickInput)  nickInput.placeholder  = t('introNickPlaceholder');
  // Update all next buttons
  document.querySelectorAll('.intro-next-btn').forEach(btn => { btn.textContent = t('introNextBtn'); });
  // Repopulate selects with new locale
  populateBirthSelects();
  // Sync main lang dropdown
  const langSel = document.getElementById('lang-select');
  if (langSel) langSel.value = lang;
}

// ---- Step navigation ----
function introNextStep() {
  const cur = document.getElementById(`intro-step-${_introStep}`);
  if (cur) cur.classList.remove('active');
  // Mark current dot as done
  const dots = document.querySelectorAll('.intro-dot');
  if (dots[_introStep]) { dots[_introStep].classList.remove('active'); dots[_introStep].classList.add('done'); }
  _introStep++;
  const next = document.getElementById(`intro-step-${_introStep}`);
  if (next) next.classList.add('active');
  if (dots[_introStep]) dots[_introStep].classList.add('active');
  // On entering final step, refresh tagline + start button text
  if (_introStep === 3) _updateIntroFinal();
}

// ---- Final step personalisation ----
function _updateIntroFinal() {
  const nick = (document.getElementById('intro-nickname')?.value || '').trim();
  const TAGLINES = {
    ja: nick ? `${nick}さん、あなたの<em>聖地巡礼</em>がいまここから始まる！`
             : 'あなたの<em>聖地巡礼</em>が、いまここから始まる',
    en: nick ? `${nick}, your <em>anime pilgrimage</em> starts here!`
             : 'Your <em>anime pilgrimage</em> starts here',
    zh: nick ? `${nick}，你的<em>圣地巡礼</em>从这里出发！`
             : '你的<em>圣地巡礼</em>，从这里出发',
    ko: nick ? `${nick}님, <em>성지순례</em>가 지금 여기서 시작됩니다!`
             : '당신의 <em>성지순례</em>가 지금 여기서 시작됩니다',
  };
  const el = document.getElementById('intro-tagline-text');
  if (el) el.innerHTML = TAGLINES[currentLang] || TAGLINES.ja;
  const startBtn = document.getElementById('intro-start-btn');
  if (startBtn) startBtn.textContent = t('introStartBtn');
}

// ---- Close / finish intro ----
function closeIntro() {
  _introActive = false;
  // Save birthday
  const y = document.getElementById('birth-year')?.value;
  const m = document.getElementById('birth-month')?.value;
  const d = document.getElementById('birth-day')?.value;
  if (y && m && d) localStorage.setItem('seichi_birthday', `${y}-${m}-${d}`);
  // Save nickname
  const nick = (document.getElementById('intro-nickname')?.value || '').trim();
  if (nick) localStorage.setItem('seichi_nickname', nick);
  // Sync lang dropdown
  const langSel = document.getElementById('lang-select');
  if (langSel) langSel.value = currentLang;

  // デモ画面をイントロの裏で先に表示（opacity:1）→ イントロが透けてもマップは見えない
  const demo = document.getElementById('demo-screen');
  if (demo) {
    demo.style.transition = 'none';
    demo.style.opacity = '1';
    demo.style.display = 'flex';
    demo.classList.add('step-0');
  }

  const screen = document.getElementById('intro-screen');
  if (screen && screen.parentNode) screen.remove();
}

try {
  (function startIntro() {
    const canvas = document.getElementById('intro-particles');
    if (!canvas) return;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const c = canvas.getContext('2d');
    const COLORS = ['#6c63ff','#ff6584','#ffd166','#55efc4','#74b9ff','#fd79a8','#43d9ad','#a29bfe','#e17055'];

    function starPath(ctx, x, y, r) {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
        const b = a + 2 * Math.PI / 5;
        i === 0 ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
                : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
        ctx.lineTo(x + r * .38 * Math.cos(b), y + r * .38 * Math.sin(b));
      }
      ctx.closePath();
    }

    const pts = Array.from({length: 55}, (_, i) => ({
      x: Math.random() * window.innerWidth,
      y: window.innerHeight * (1 + Math.random()),
      vx: (Math.random() - .5) * .55,
      vy: -(0.5 + Math.random() * 1.6),
      r:  2 + Math.random() * 4.5,
      color: COLORS[i % COLORS.length],
      op:  .35 + Math.random() * .55,
      flicker: Math.random() * Math.PI * 2,
      star: i % 3 !== 0,
    }));

    _introActive = true;
    function draw() {
      if (!_introActive) return;
      c.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.flicker += .04;
        if (p.y < -20) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
        const alpha = p.op * (.6 + .4 * Math.sin(p.flicker));
        c.globalAlpha = alpha;
        c.fillStyle = p.color;
        c.shadowBlur = 10; c.shadowColor = p.color;
        if (p.star) { starPath(c, p.x, p.y, p.r); c.fill(); }
        else { c.beginPath(); c.arc(p.x, p.y, p.r * .65, 0, Math.PI * 2); c.fill(); }
      });
      c.globalAlpha = 1; c.shadowBlur = 0;
      requestAnimationFrame(draw);
    }
    draw();

    // Populate birthday selects on load
    populateBirthSelects();

    // アニメアイコンを時差でポップイン（step 3 に追加）
    const row = document.getElementById('intro-icons-row');
    if (row) {
      ANIME.forEach((a, i) => {
        const span = document.createElement('span');
        span.className = 'intro-icon';
        span.textContent = a.icon;
        span.style.animationDelay = `${.5 + i * .09}s`;
        row.appendChild(span);
      });
    }
  })();
} catch(e) {
  console.warn('Intro animation error (non-fatal):', e);
}

// ===================== DEMO SCREEN =====================
let _demoStep = 0;

function showDemoScreen() {
  const demo = document.getElementById('demo-screen');
  if (!demo) return;
  demo.style.opacity = '0';
  demo.style.display = 'flex';
  demo.classList.add('step-0');
  requestAnimationFrame(() => {
    demo.style.transition = 'opacity .6s ease';
    demo.style.opacity = '1';
  });
}

function demoSetStep(n) {
  const demo = document.getElementById('demo-screen');
  if (!demo) return;
  demo.classList.remove('step-0', 'step-1', 'step-2');
  demo.classList.add(`step-${n}`);
  document.querySelectorAll('.demo-step').forEach((el, i) => {
    el.classList.toggle('active', i === n);
  });
  _demoStep = n;
}

function demoNext() { demoSetStep(_demoStep + 1); }

function demoLaunchAR() {
  const overlay = document.getElementById('demo-ar-overlay');
  if (!overlay) return;
  overlay.style.display = 'flex';
  const video = document.getElementById('demo-ar-video');
  if (navigator.mediaDevices?.getUserMedia) {
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    }).then(stream => {
      video.srcObject = stream;
      video._stream = stream;
    }).catch(() => {
      video.style.display = 'none'; // カメラ不可でもみつはは表示される
    });
  } else {
    video.style.display = 'none';
  }
}

function demoCapture() {
  const flash = document.getElementById('demo-ar-flash');
  if (flash) {
    flash.classList.add('on');
    setTimeout(() => flash.classList.remove('on'), 200);
  }
  setTimeout(() => {
    // カメラ停止
    const video = document.getElementById('demo-ar-video');
    if (video?._stream) {
      video._stream.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    video.style.display = '';
    const overlay = document.getElementById('demo-ar-overlay');
    if (overlay) overlay.style.display = 'none';
    demoSetStep(2);
  }, 380);
}

function closeDemo() {
  const demo = document.getElementById('demo-screen');
  if (!demo) return;
  demo.classList.add('fade-out');
  setTimeout(() => { if (demo.parentNode) demo.remove(); }, 700);
}

// ===================== INIT =====================
loadCheckins();
updateBadge();
buildFilterChips();
initMap();
</script>
